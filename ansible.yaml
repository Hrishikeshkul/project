---
- name: Deploy WAR to Tomcat nodes
  hosts: all
  become: yes

  vars:
    war_name: LoginWebApp.war
    app_name: LoginWebApp
    tomcat_path: /mnt/apache-tomcat-10.1.57

  tasks:
    - name: Stop Tomcat
      shell: "{{ tomcat_path }}/bin/shutdown.sh"
      ignore_errors: yes

    - name: Remove old WAR
      file:
        path: "{{ tomcat_path }}/webapps/{{ war_name }}"
        state: absent

    - name: Remove exploded application
      file:
        path: "{{ tomcat_path }}/webapps/{{ app_name }}"
        state: absent

    - name: Copy new WAR
      copy:
        src: "target/{{ war_name }}"
        dest: "{{ tomcat_path }}/webapps/{{ war_name }}"
        owner: tomcat
        group: tomcat
        mode: "0644"

    - name: Start Tomcat
      shell: "{{ tomcat_path }}/bin/startup.sh"

